<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Air Quality Monitoring</title>
    <link rel="stylesheet" href="/css/style.css?v=1779706048872">
</head>
<body class="login-page">
    <div class="auth-container">
        <div class="auth-branding">
            <div class="brand-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M3 15a4 4 0 004 4h9a5 5 0 10-.1-9.999 5.002 5.002 0 10-9.78 2.096A4.001 4.001 0 003 15z"/>
                </svg>
            </div>
            <h1>Air Quality Monitoring</h1>
            <p>Pantau kualitas udara secara real-time menggunakan sensor IoT.</p>
        </div>
        
        <div class="auth-form-container">
            <h2>Masuk ke Akun Anda</h2>
            <p class="subtitle">Silakan login untuk melanjutkan</p>
            
            <form id="loginForm" class="auth-form">
                <div class="form-group">
                    <label for="email">Email</label>
                    <div class="input-wrapper">
                        <span class="input-icon">@</span>
                        <input type="email" id="email" name="email" placeholder="Masukkan email" required>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-wrapper">
                        <span class="input-icon">#</span>
                        <input type="password" id="password" name="password" placeholder="Masukkan password" required>
                        <button type="button" class="toggle-password" onclick="togglePassword('password')">Show</button>
                    </div>
                </div>
                
                <div class="form-options">
                    <label class="checkbox-wrapper">
                        <input type="checkbox" name="remember" id="remember">
                        <span>Ingat saya</span>
                    </label>
                    <a href="/forgot-password" class="forgot-link">Lupa password?</a>
                </div>
                
                <button type="submit" class="btn-primary btn-block">Masuk</button>
                
                <p class="auth-switch">
                    Belum punya akun? <a href="/register">Daftar di sini</a>
                </p>
            </form>
        </div>
    </div>
    <script src="/js/auth.js"></script>
</body>
</html>
