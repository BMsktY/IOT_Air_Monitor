<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lupa Password - Air Quality Monitoring</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="login-page">
    <div class="auth-container">
        <div class="auth-branding">
            <div class="brand-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M3 15a4 4 0 004 4h9a5 5 0 10-.1-9.999 5.002 5.002 0 10-9.78 2.096A4.001 4.001 0 003 15z"/>
                </svg>
            </div>
            <h1>Air Quality Monitoring</h1>
            <p>Pantau kualitas udara secara real-time menggunakan sensor IoT.</p>
        </div>
        
        <div class="auth-form-container">
            <h2>Reset Password</h2>
            <p class="subtitle">Masukkan email dan password baru</p>
            
            <form id="forgotForm" class="auth-form">
                <div class="form-group">
                    <label for="email">Email Terdaftar</label>
                    <div class="input-wrapper">
                        <span class="input-icon">@</span>
                        <input type="email" id="email" name="email" placeholder="Masukkan email Anda" required>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="newPassword">Password Baru</label>
                    <div class="input-wrapper">
                        <span class="input-icon">#</span>
                        <input type="password" id="newPassword" name="newPassword" placeholder="Minimal 6 karakter" required minlength="6">
                        <button type="button" class="toggle-password" onclick="togglePassword('newPassword')">Show</button>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="confirmPassword">Konfirmasi Password Baru</label>
                    <div class="input-wrapper">
                        <span class="input-icon">#</span>
                        <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Ulangi password baru" required>
                        <button type="button" class="toggle-password" onclick="togglePassword('confirmPassword')">Show</button>
                    </div>
                </div>
                
                <button type="submit" class="btn-primary btn-block">Reset Password</button>
                
                <p class="auth-switch">
                    <a href="/login">Kembali ke Login</a>
                </p>
            </form>
            
            <div id="resetMessage" class="message-box" style="display: none;"></div>
        </div>
    </div>
    <script>
        function togglePassword(inputId) {
            const input = document.getElementById(inputId);
            const button = input.nextElementSibling;
            if (input.type === 'password') {
                input.type = 'text';
                button.textContent = 'Hide';
            } else {
                input.type = 'password';
                button.textContent = 'Show';
            }
        }
        
        const forgotForm = document.getElementById('forgotForm');
        const resetMessage = document.getElementById('resetMessage');
        
        forgotForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            if (newPassword !== confirmPassword) {
                alert('Password baru tidak cocok!');
                return;
            }
            if (newPassword.length < 6) {
                alert('Password minimal 6 karakter!');
                return;
            }
            
            try {
                const response = await fetch('/api/auth/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, newPassword })
                });
                const data = await response.json();
                
                resetMessage.style.display = 'block';
                resetMessage.className = response.ok ? 'message-success' : 'message-error';
                resetMessage.textContent = data.message;
                
                if (response.ok) {
                    setTimeout(() => { window.location.href = '/login'; }, 2000);
                }
            } catch (error) {
                resetMessage.style.display = 'block';
                resetMessage.className = 'message-error';
                resetMessage.textContent = 'Terjadi kesalahan. Pastikan server berjalan.';
            }
        });
    </script>
</body>
</html>
