<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Air Quality Monitoring</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="login-page">
    <div class="auth-container">
        <div class="auth-branding">
            <div class="brand-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M3 15a4 4 0 004 4h9a5 5 0 10-.1-9.999 5.002 5.002 0 10-9.78 2.096A4.001 4.001 0 003 15z"/>
                </svg>
            </div>
            <h1>Air Quality Monitoring</h1>
            <p>Pantau kualitas udara secara real-time menggunakan sensor IoT.</p>
        </div>
        
        <div class="auth-form-container">
            <h2>Buat Akun Baru</h2>
            <p class="subtitle">Daftar sebagai user Publik</p>
            
            <form id="registerForm" class="auth-form">
                <div class="form-group">
                    <label for="nama">Nama Lengkap</label>
                    <div class="input-wrapper">
                        <input type="text" id="nama" name="nama" placeholder="Masukkan nama lengkap" required>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="email">Email</label>
                    <div class="input-wrapper">
                        <span class="input-icon">@</span>
                        <input type="email" id="email" name="email" placeholder="Masukkan email" required>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-wrapper">
                        <span class="input-icon">#</span>
                        <input type="password" id="password" name="password" placeholder="Minimal 6 karakter" required minlength="6">
                        <button type="button" class="toggle-password" onclick="togglePassword('password')">Show</button>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="confirmPassword">Konfirmasi Password</label>
                    <div class="input-wrapper">
                        <span class="input-icon">#</span>
                        <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Ulangi password" required>
                        <button type="button" class="toggle-password" onclick="togglePassword('confirmPassword')">Show</button>
                    </div>
                </div>
                
                <button type="submit" class="btn-primary btn-block">Daftar Sekarang</button>
                
                <p class="auth-switch">
                    Sudah punya akun? <a href="/login">Masuk di sini</a>
                </p>
            </form>
        </div>
    </div>
    <script src="/js/auth.js"></script>
</body>
</html>
