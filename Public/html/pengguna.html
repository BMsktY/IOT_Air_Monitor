<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kelola Pengguna - Air Quality Monitoring</title>
    <link rel="stylesheet" href="/css/style.css">
</head>

<body class="admin-page">
    <div class="app-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>AQMS</h2>
            </div>
            <nav class="sidebar-nav">
            </nav>
            <div class="sidebar-footer">
                <button onclick="logout()" class="btn-logout">
                    <span>Logout</span>
                </button>
            </div>
        </aside>
        <main class="main-content">
            <header class="top-header">
                <h1>Kelola Pengguna</h1>
                <div class="header-actions">
                    <button class="btn-primary" onclick="openModal()">
                        Tambah Pengguna
                    </button>
                </div>
            </header>
            <div class="admin-content">
                <div class="table-container">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Nama Lengkap</th>
                                <th>Email</th>
                                <th>Role (Jabatan)</th>
                                <th>Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="userTableBody">
                            <!-- Data will be loaded by JavaScript -->
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- Modal Form -->
    <div id="userModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Tambah Pengguna</h2>
                <button class="close-btn" onclick="closeModal()">&times;</button>
            </div>
            <form id="userForm">
                <input type="hidden" id="userId" name="Id_user">

                <div class="form-group">
                    <label for="nama">Nama Lengkap</label>
                    <input type="text" id="nama" name="Nama" required>
                </div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="Email" required>
                </div>

                <div class="form-group">
                    <label for="role">Role / Jabatan</label>
                    <select id="role" name="Role" required>
                        <option value="Publik">Publik</option>
                        <option value="Analis">Analis</option>
                        <option value="Admin">Admin</option>
                    </select>
                </div>

                <div class="form-group">
                    <label id="passwordLabel" for="password">Password (Minimal 6 karakter)</label>
                    <input type="password" id="password" name="Password"
                        placeholder="Biarkan kosong jika tidak ingin mengubah password (saat Edit)" minlength="6">
                </div>

                <div class="modal-actions">
                    <button type="button" class="btn-secondary" onclick="closeModal()">Batal</button>
                    <button type="submit" class="btn-primary">Simpan</button>
                </div>
            </form>
        </div>
    </div>
    <script src="/js/auth.js"></script>
    <script src="/js/pengguna.js"></script>
</body>

</html>
